<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Ticket Registration</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #021742, #10366f, #586d8c);
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 500px;
      background: rgba(201, 208, 251, 0.95);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
    }

    h1 {
      text-align: center;
      color: #111827;
      margin-bottom: 10px;
    }

    p {
      text-align: center;
      color: #6b7280;
      margin-bottom: 25px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #374151;
    }

    input, select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: 0.3s;
      background: #fff;
    }

    input:focus, select:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    .row {
      display: flex;
      gap: 12px;
    }

    .row .formgrp {
      flex: 1;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #1d4ed8;
    }

    .note {
      font-size: 13px;
      text-align: center;
      color: #6b7280;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Movie Ticket Registration</h1>
    <p>Book your movie tickets online</p>

    <form action="">
      <div class="formgrp">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your name" required>
      </div>

      <div class="formgrp">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
      </div>

      <div class="formgrp">
        <label for="movie">Select Movie</label>
        <select id="movie" name="movie" required>
          <option value="">-- Choose a movie --</option>
          <option value="Avengers">Avengers</option>
          <option value="Interstellar">Interstellar</option>
          <option value="Avatar">Avatar</option>
          <option value="Oppenheimer">Oppenheimer</option>
        </select>
      </div>

      <div class="row">
        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" id="date" name="date" required>
        </div>

        <div class="form-group">
          <label for="time">Show Time</label>
          <select id="time" name="time" required>
            <option value="">-- Select The Time Slot --</option>
            <option value="10am">10:00 AM</option>
            <option value="1pm">1:00 PM</option>
            <option value="4pm">4:00 PM</option>
            <option value="7pm">7:00 PM</option>
            <option value="10pm">10:00 PM</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="formgrp">
          <label for="seats">Number of Seats</label>
          <input type="number" id="seats" name="seats" min="1" max="10" placeholder="1" required>
        </div>

        <div class="formgrp">
          <label for="payment">Payment Method</label>
          <select id="payment" name="payment" required>
            <option value="">-- Select Payment Gateway --</option>
            <option value="card">Credit/Debit Card</option>
            <option value="upi">UPI</option>
            <option value="netbanking">Net Banking</option>
          </select>
        </div>
      </div>

      <br><br>

      <button type="submit">Register & Book Ticket</button>
    </form>

    <div class="note">Your ticket details will be sent to your email.</div>
  </div>
</body>
</html>
