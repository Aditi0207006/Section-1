<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instructor Section</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-purple-100">

    <section class="max-w-7xl mx-auto px-8 py-20">
        <div class="grid md:grid-cols-2 gap-16 items-center">

           
            <div>
                <span class="text-purple-600 font-bold uppercase tracking-wider fontsize-sm">
                    Join Our Team
                </span>

                <h1 class="text-5xl font-bold text-slate-800 mt-4 leading-tight">
                    Share Your Knowledge
                    <span class="text-purple-600">With The World</span>
                </h1>

                <p class="text-gray-600 mt-6 text-lg leading-relaxed">
                    Inspire learners, build your personal brand, and create
                    meaningful educational experiences. Become part of a growing
                    community of passionate educators.
                </p>

              
                <div class="grid grid-cols-2 gap-4 mt-10">

                    <div class="flex items-center gap-3">
                        <div class="w-2 h-2 rounded-full bg-blue-500"></div>
                        <span>Flexible Hours</span>
                    </div>

                    <div class="flex items-center gap-3">
                        <div class="w-2 h-2 rounded-full bg-purple-500"></div>
                        <span>Global Reach</span>
                    </div>

                    <div class="flex items-center gap-3">
                        <div class="w-2 h-2 rounded-full bg-blue-500"></div>
                        <span>Creative Freedom</span>
                    </div>

                    <div class="flex items-center gap-3">
                        <div class="w-2 h-2 rounded-full bg-purple-500"></div>
                        <span>Skill Growth</span>
                    </div>

                    <div class="flex items-center gap-3">
                        <div class="w-2 h-2 rounded-full bg-blue-500"></div>
                        <span>Recognition</span>
                    </div>

                    <div class="flex items-center gap-3">
                        <div class="w-2 h-2 rounded-full bg-purple-500"></div>
                        <span>Networking</span>
                    </div>

                </div>

                <button class="mt-10 px-8 py-4 rounded-xl bg-gradient-to-r from-blue-600 to-purple-600 text-white font-semibold shadow-lg hover:scale-105 transition">
                    Share your Knowledge
                </button>
            </div>

           
            <div class="flex justify-center">

                <div class="relative">
                    
                   
                    <div class="relative bg-gradient-to-br from-blue-500 to-purple-600 p-4 rounded-[40px] shadow-2xl">
                        <img
                            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSWRVeZRWUydhQL4zpZi_L87HO0ZIOtXRVE6pwZC_8Mf4KGa4e4odPs2cQ8&s=10"
                            alt="Instructor"
                            class="w-80 h-[420px] object-cover rounded-[30px]"
                        >
                    </div>

                </div>

            </div>

        </div>
    </section>

</body>
</html>
